name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-artifacts:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Check package
        run: |
          swift build

          if [[ -d Tests ]]; then
            swift test
          else
            echo "No Tests directory found; skipping swift test."
          fi

      - name: Prepare script permission
        run: chmod +x scripts/package-macos.sh

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Build app bundle
        run: ./scripts/package-macos.sh

      - name: Validate app version
        run: |
          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' dist/rawpicker.app/Contents/Info.plist)"
          APP_BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' dist/rawpicker.app/Contents/Info.plist)"

          echo "App version: ${APP_VERSION}"
          echo "App build: ${APP_BUILD}"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"

            if [[ "$APP_VERSION" != "$RELEASE_VERSION" ]]; then
              echo "Tag version ${RELEASE_VERSION} does not match app version ${APP_VERSION}." >&2
              exit 1
            fi
          fi

      - name: Sign app with Developer ID
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$DEVELOPER_ID_APPLICATION" \
            dist/rawpicker.app

          codesign --verify --deep --strict --verbose=2 dist/rawpicker.app

      - name: Create and sign DMG
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          DMG_PATH="dist/RawPicker.dmg"
          DMG_ROOT_DIR="dist/dmg-root"

          rm -f "$DMG_PATH"
          rm -rf "$DMG_ROOT_DIR"
          mkdir -p "$DMG_ROOT_DIR"
          ditto dist/rawpicker.app "$DMG_ROOT_DIR/RawPicker.app"
          ln -s /Applications "$DMG_ROOT_DIR/Applications"

          codesign --verify --deep --strict --verbose=2 "$DMG_ROOT_DIR/RawPicker.app"

          hdiutil create \
            -volname "RawPicker" \
            -srcfolder "$DMG_ROOT_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          codesign --force --timestamp \
            --sign "$DEVELOPER_ID_APPLICATION" \
            "$DMG_PATH"

          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize and staple DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf "%s" "$APPLE_API_PRIVATE_KEY" > "$API_KEY_PATH"

          xcrun notarytool submit dist/RawPicker.dmg \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple dist/RawPicker.dmg
          xcrun stapler validate dist/RawPicker.dmg
          spctl -a -vvv -t install dist/RawPicker.dmg

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: rawpicker-macos
          path: |
            dist/rawpicker.app
            dist/RawPicker.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/RawPicker.dmg
          generate_release_notes: true
