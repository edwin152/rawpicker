name: CI

on:
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: |
          if [[ -d Tests ]]; then
            swift test
          else
            echo "No Tests directory found; skipping swift test."
          fi
